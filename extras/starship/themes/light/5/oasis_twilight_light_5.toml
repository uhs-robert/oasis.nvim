# Oasis Twilight Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_twilight_light_5"

[palettes.oasis_twilight_light_5]
# Accent
primary       = '#782107'
strong_primary = '#7f351a'

# ANSI colors (0-7)
