red           = '#900e0e'
green         = '#2c4f29'
blue          = '#0f487f'
purple        = '#5f1cad'
cyan          = '#284d49'
white         = '#453a0e'

# Bright ANSI colors (8-15)
bright_black  = '#413932'
bright_red    = '#900e0e'
bright_green  = '#2a4f25'
bright_yellow = '#693c0f'
bright_blue   = '#1c4c60'
bright_purple = '#5e1cad'
bright_cyan   = '#274d47'
bright_white  = '#413a23'
