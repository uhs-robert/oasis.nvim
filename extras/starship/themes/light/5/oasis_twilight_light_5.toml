# Oasis Twilight Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_twilight_light_5"

[palettes.oasis_twilight_light_5]
# Accent
primary       = '#5e1a06'
strong_primary = '#8a391c'

# ANSI colors (0-7)
black         = '#3d3d3d'
red           = '#940e0e'
green         = '#2e512b'
blue          = '#104a83'
purple        = '#621db2'
cyan          = '#294f4b'
white         = '#473c0f'

# Bright ANSI colors (8-15)
bright_black  = '#433b34'
bright_red    = '#940e0e'
bright_green  = '#2b5226'
bright_yellow = '#6c3e10'
bright_blue   = '#1c4e63'
bright_purple = '#611db2'
bright_cyan   = '#28504a'
bright_white  = '#433d24'
