# Oasis Moonlight Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_moonlight_light_5"

[palettes.oasis_moonlight_light_5]
# Accent
primary       = '#263f5a'
strong_primary = '#2d4c6c'

# ANSI colors (0-7)
black         = '#54362e'
red           = '#950e0e'
green         = '#2e522b'
blue          = '#104b84'
purple        = '#621db3'
cyan          = '#29504b'
white         = '#483d0f'

# Bright ANSI colors (8-15)
bright_black  = '#50382b'
bright_red    = '#950e0e'
bright_green  = '#2b5226'
bright_yellow = '#6d3e10'
bright_blue   = '#1d4f63'
bright_purple = '#621eb4'
bright_cyan   = '#29504a'
bright_white  = '#443d24'
