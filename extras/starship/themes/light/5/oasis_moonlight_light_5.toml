red           = '#9e0f0f'
green         = '#31572e'
blue          = '#114f8d'
purple        = '#691fbe'
cyan          = '#2c5550'
white         = '#42370e'

# Bright ANSI colors (8-15)
bright_black  = '#3e3730'
bright_red    = '#9e0f0f'
bright_green  = '#2e5829'
bright_yellow = '#744211'
bright_blue   = '#1e546a'
bright_purple = '#681fbf'
bright_cyan   = '#2b564f'
bright_white  = '#3e3821'
