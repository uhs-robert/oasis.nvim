# Oasis Sol Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_sol_light_5"

[palettes.oasis_sol_light_5]
# Accent
primary       = '#630000'
strong_primary = '#7f2727'

# ANSI colors (0-7)
black         = '#1d1d1d'
red           = '#720b0b'
green         = '#233d20'
blue          = '#0c3864'
purple        = '#4a1687'
cyan          = '#1f3c39'
white         = '#221d07'

# Bright ANSI colors (8-15)
bright_black  = '#201d19'
bright_red    = '#720b0b'
bright_green  = '#213e1d'
bright_yellow = '#522f0c'
bright_blue   = '#153b4b'
bright_purple = '#4a1688'
bright_cyan   = '#1f3c38'
bright_white  = '#201d11'
