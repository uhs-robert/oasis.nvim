# Oasis Canyon Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_canyon_light_5"

[palettes.oasis_canyon_light_5]
# Accent
primary       = '#5f3105'
strong_primary = '#8d5118'

# ANSI colors (0-7)
black         = '#2e2e2e'
red           = '#8d0e0e'
green         = '#2c4d29'
blue          = '#0f467d'
purple        = '#5d1ca9'
cyan          = '#274c47'
white         = '#372e0b'

# Bright ANSI colors (8-15)
bright_black  = '#342e28'
bright_red    = '#8d0e0e'
bright_green  = '#294e24'
bright_yellow = '#673b0f'
bright_blue   = '#1b4b5e'
bright_purple = '#5c1caa'
bright_cyan   = '#274c46'
bright_white  = '#332e1b'
