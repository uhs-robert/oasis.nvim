red           = '#ab1111'
green         = '#365f32'
blue          = '#135699'
purple        = '#7122ce'
cyan          = '#305d57'
white         = '#4a3e0f'

# Bright ANSI colors (8-15)
bright_black  = '#463e36'
bright_red    = '#ab1111'
bright_green  = '#325f2c'
bright_yellow = '#7e4812'
bright_blue   = '#215b73'
bright_purple = '#7122cf'
bright_cyan   = '#2f5d56'
bright_white  = '#463f25'
