# Oasis Rose Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_rose_light_5"

[palettes.oasis_rose_light_5]
# Accent
primary       = '#800000'
strong_primary = '#990000'

# ANSI colors (0-7)
black         = '#3d3d3d'
red           = '#950e0e'
green         = '#2e512b'
blue          = '#104a84'
purple        = '#621db2'
cyan          = '#29504b'
white         = '#483c0f'

# Bright ANSI colors (8-15)
bright_black  = '#443c35'
bright_red    = '#940e0e'
bright_green  = '#2b5226'
bright_yellow = '#6d3e10'
bright_blue   = '#1c4f63'
bright_purple = '#611db3'
bright_cyan   = '#29504a'
bright_white  = '#443d24'
