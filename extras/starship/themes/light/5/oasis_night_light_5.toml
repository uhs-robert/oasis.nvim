# Oasis Night Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_night_light_5"

[palettes.oasis_night_light_5]
# Accent
primary       = '#1e3146'
strong_primary = '#315275'

# ANSI colors (0-7)
