# Oasis Luna Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_luna_light_5"

[palettes.oasis_luna_light_5]
# Accent
primary       = '#58500b'
strong_primary = '#34297d'

# ANSI colors (0-7)
black         = '#303030'
red           = '#8f0e0e'
green         = '#2c4e29'
blue          = '#0f487f'
purple        = '#5e1cac'
cyan          = '#274d48'
white         = '#382f0c'

# Bright ANSI colors (8-15)
bright_black  = '#352f29'
bright_red    = '#8f0e0e'
bright_green  = '#2a4f25'
bright_yellow = '#683c0f'
bright_blue   = '#1b4c5f'
bright_purple = '#5e1cac'
bright_cyan   = '#274d47'
bright_white  = '#35301c'
