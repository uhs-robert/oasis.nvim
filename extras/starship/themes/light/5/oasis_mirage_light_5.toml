red           = '#aa1010'
green         = '#355e31'
blue          = '#125598'
purple        = '#7021cc'
cyan          = '#2f5c57'
white         = '#493e0f'

# Bright ANSI colors (8-15)
bright_black  = '#453d36'
bright_red    = '#aa1111'
bright_green  = '#325f2c'
bright_yellow = '#7d4712'
bright_blue   = '#215a72'
bright_purple = '#6f22cd'
bright_cyan   = '#2f5c55'
bright_white  = '#453e25'
