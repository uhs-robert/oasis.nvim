# Oasis Mirage Light 5 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_mirage_light_5"

[palettes.oasis_mirage_light_5]
# Accent
primary       = '#1d4641'
strong_primary = '#31756d'

# ANSI colors (0-7)
