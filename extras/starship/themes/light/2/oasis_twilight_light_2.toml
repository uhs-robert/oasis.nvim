# Oasis Twilight Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_twilight_light_2"

[palettes.oasis_twilight_light_2]
# Accent
primary       = '#912c0d'
strong_primary = '#954122'

# ANSI colors (0-7)
