# Bright ANSI colors (8-15)
bright_black  = '#594d45'
bright_red    = '#b71212'
bright_green  = '#36662f'
bright_yellow = '#874d14'
bright_blue   = '#23627b'
bright_purple = '#7827db'
bright_cyan   = '#33645c'
bright_white  = '#584f2f'
