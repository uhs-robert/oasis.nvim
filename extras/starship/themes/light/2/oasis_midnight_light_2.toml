# Oasis Midnight Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_2"

[palettes.oasis_midnight_light_2]
# Accent
primary       = '#615b21'
strong_primary = '#86803f'

# ANSI colors (0-7)
black         = '#414141'
red           = '#ae1212'
green         = '#376033'
blue          = '#13589d'
purple        = '#7323d2'
cyan          = '#315f59'
white         = '#4c4010'

# Bright ANSI colors (8-15)
bright_black  = '#493f39'
bright_red    = '#ae1212'
bright_green  = '#33612d'
bright_yellow = '#804913'
bright_blue   = '#225d76'
bright_purple = '#7223d3'
bright_cyan   = '#305f58'
bright_white  = '#474126'
