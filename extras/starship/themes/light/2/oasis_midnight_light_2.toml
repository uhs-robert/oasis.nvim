# Oasis Midnight Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_2"

[palettes.oasis_midnight_light_2]
# Accent
primary       = '#615b21'
strong_primary = '#86803f'

# ANSI colors (0-7)
