red           = '#b31212'
green         = '#386335'
blue          = '#145aa2'
purple        = '#7624d8'
cyan          = '#32625c'
white         = '#5b4c13'

# Bright ANSI colors (8-15)
bright_black  = '#574b43'
bright_red    = '#b31212'
bright_green  = '#35642e'
bright_yellow = '#844c13'
bright_blue   = '#236079'
bright_purple = '#7624d9'
bright_cyan   = '#32625a'
bright_white  = '#554d2e'
