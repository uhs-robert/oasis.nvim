# Oasis Luna Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_luna_light_2"

[palettes.oasis_luna_light_2]
# Accent
primary       = '#887d16'
strong_primary = '#7d783b'

# ANSI colors (0-7)
