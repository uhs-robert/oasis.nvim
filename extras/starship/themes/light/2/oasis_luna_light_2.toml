red           = '#9d1010'
green         = '#31572e'
blue          = '#114f8d'
purple        = '#681fbd'
cyan          = '#2c5550'
white         = '#4d4110'

# Bright ANSI colors (8-15)
bright_black  = '#4a4039'
bright_red    = '#9d1010'
bright_green  = '#2e5728'
bright_yellow = '#734211'
bright_blue   = '#1e5469'
bright_purple = '#671fbe'
bright_cyan   = '#2b554f'
bright_white  = '#494227'
