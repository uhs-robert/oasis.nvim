# Bright ANSI colors (8-15)
bright_black  = '#544942'
bright_red    = '#c21414'
bright_green  = '#3a6d33'
bright_yellow = '#905215'
bright_blue   = '#266984'
bright_purple = '#7f32dd'
bright_cyan   = '#366a63'
bright_white  = '#534b2c'
