# Oasis Starlight Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_starlight_light_2"

[palettes.oasis_starlight_light_2]
# Accent
primary       = '#054b7d'
strong_primary = '#1b70aa'

# ANSI colors (0-7)
