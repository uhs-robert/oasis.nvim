# Oasis Desert Light 2 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_desert_light_2"

[palettes.oasis_desert_light_2]
# Accent
primary       = '#7e0404'
strong_primary = '#86803f'

# ANSI colors (0-7)
black         = '#545454'
red           = '#c11313'
green         = '#3d6b39'
blue          = '#1561ae'
purple        = '#8030dd'
cyan          = '#366963'
white         = '#635315'

# Bright ANSI colors (8-15)
bright_black  = '#5f524a'
bright_red    = '#c11313'
bright_green  = '#396c32'
bright_yellow = '#8f5215'
bright_blue   = '#256882'
bright_purple = '#7e31dd'
bright_cyan   = '#366a62'
bright_white  = '#5d5432'
