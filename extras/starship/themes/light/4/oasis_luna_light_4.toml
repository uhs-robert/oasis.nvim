# Oasis Luna Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_luna_light_4"

[palettes.oasis_luna_light_4]
# Accent
primary       = '#60580d'
strong_primary = '#382c84'

# ANSI colors (0-7)
