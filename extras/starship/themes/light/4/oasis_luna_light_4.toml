# Bright ANSI colors (8-15)
bright_black  = '#37302b'
bright_red    = '#7e0c0c'
bright_green  = '#244520'
bright_yellow = '#5c340e'
bright_blue   = '#184253'
bright_purple = '#521998'
bright_cyan   = '#22433e'
bright_white  = '#36311d'
