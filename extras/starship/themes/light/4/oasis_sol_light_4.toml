# Oasis Sol Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_sol_light_4"

[palettes.oasis_sol_light_4]
# Accent
primary       = '#880101'
strong_primary = '#871c1c'

# ANSI colors (0-7)
black         = '#414141'
red           = '#9c1010'
green         = '#30562e'
blue          = '#114e8b'
purple        = '#671fbb'
cyan          = '#2b5450'
white         = '#4c4010'

# Bright ANSI colors (8-15)
bright_black  = '#493f39'
bright_red    = '#9c0f0f'
bright_green  = '#2d5628'
bright_yellow = '#724111'
bright_blue   = '#1e5368'
bright_purple = '#661ebd'
bright_cyan   = '#2b544e'
bright_white  = '#484126'
