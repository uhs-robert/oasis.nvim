# Oasis Sol Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_sol_light_4"

[palettes.oasis_sol_light_4]
# Accent
primary       = '#6d0101'
strong_primary = '#862a2a'

# ANSI colors (0-7)
