red           = '#a51111'
green         = '#335b30'
blue          = '#125393'
purple        = '#6d21c6'
cyan          = '#2e5954'
white         = '#524511'

# Bright ANSI colors (8-15)
bright_black  = '#4e443d'
bright_red    = '#a51010'
bright_green  = '#305b2a'
bright_yellow = '#794512'
bright_blue   = '#1f586f'
bright_purple = '#6c20c8'
bright_cyan   = '#2e5953'
bright_white  = '#4d4629'
