# Oasis Midnight Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_4"

[palettes.oasis_midnight_light_4]
# Accent
primary       = '#534e1b'
strong_primary = '#797437'

# ANSI colors (0-7)
