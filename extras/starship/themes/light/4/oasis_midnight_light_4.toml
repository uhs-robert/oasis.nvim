cyan          = '#2b544f'
white         = '#40360e'

# Bright ANSI colors (8-15)
bright_black  = '#3d3530'
bright_red    = '#9b0f0f'
bright_green  = '#2d5628'
bright_yellow = '#724111'
bright_blue   = '#1d5368'
bright_purple = '#661ebc'
bright_cyan   = '#2b544e'
bright_white  = '#3c3620'
