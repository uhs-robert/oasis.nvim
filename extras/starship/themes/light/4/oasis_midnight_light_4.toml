# Oasis Midnight Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_4"

[palettes.oasis_midnight_light_4]
# Accent
primary       = '#686222'
strong_primary = '#706c33'

# ANSI colors (0-7)
black         = '#454545'
red           = '#a31111'
green         = '#335a30'
blue          = '#125292'
purple        = '#6c20c5'
cyan          = '#2e5854'
white         = '#514411'

# Bright ANSI colors (8-15)
bright_black  = '#4d433c'
bright_red    = '#a31010'
bright_green  = '#305b2a'
bright_yellow = '#784512'
bright_blue   = '#1f576d'
bright_purple = '#6b20c6'
bright_cyan   = '#2d5952'
bright_white  = '#4c4529'
