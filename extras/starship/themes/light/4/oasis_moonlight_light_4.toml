# Oasis Moonlight Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_moonlight_light_4"

[palettes.oasis_moonlight_light_4]
# Accent
primary       = '#21364d'
strong_primary = '#35577b'

# ANSI colors (0-7)
black         = '#3c3c3c'
red           = '#a61111'
green         = '#345c31'
blue          = '#125394'
purple        = '#6e21c7'
cyan          = '#2e5a55'
white         = '#473c0f'

# Bright ANSI colors (8-15)
bright_black  = '#433b35'
bright_red    = '#a61010'
bright_green  = '#315c2a'
bright_yellow = '#7a4612'
bright_blue   = '#20596f'
bright_purple = '#6d20c9'
bright_cyan   = '#2e5a53'
bright_white  = '#433c23'
