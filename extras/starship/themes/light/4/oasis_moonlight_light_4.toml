# Oasis Moonlight Light 4 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_moonlight_light_4"

[palettes.oasis_moonlight_light_4]
# Accent
primary       = '#294460'
strong_primary = '#315172'

# ANSI colors (0-7)
black         = '#5a3a31'
red           = '#9d1010'
green         = '#31562e'
blue          = '#114f8c'
purple        = '#681fbd'
cyan          = '#2c5550'
white         = '#4d4110'

# Bright ANSI colors (8-15)
bright_black  = '#563c2f'
bright_red    = '#9d0f0f'
bright_green  = '#2e5728'
bright_yellow = '#734211'
bright_blue   = '#1e5369'
bright_purple = '#671fbe'
bright_cyan   = '#2b554e'
bright_white  = '#494227'
