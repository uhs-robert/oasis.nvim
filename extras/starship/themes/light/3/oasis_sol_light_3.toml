red           = '#8b0e0e'
green         = '#2b4c28'
blue          = '#0f457b'
purple        = '#5c1ba7'
cyan          = '#264b47'
white         = '#362d0b'

# Bright ANSI colors (8-15)
bright_black  = '#332c28'
bright_red    = '#8b0e0e'
bright_green  = '#294d23'
bright_yellow = '#653a0f'
bright_blue   = '#1a4a5c'
bright_purple = '#5b1ca8'
bright_cyan   = '#264b45'
bright_white  = '#322d1b'
