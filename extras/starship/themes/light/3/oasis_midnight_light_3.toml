# Oasis Midnight Light 3 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_3"

[palettes.oasis_midnight_light_3]
# Accent
primary       = '#5a551e'
strong_primary = '#7f7a3b'

# ANSI colors (0-7)
black         = '#454545'
red           = '#a41111'
green         = '#335b30'
blue          = '#125292'
purple        = '#6d20c6'
cyan          = '#2d5954'
white         = '#524511'

# Bright ANSI colors (8-15)
bright_black  = '#4d443c'
bright_red    = '#a41111'
bright_green  = '#305b2a'
bright_yellow = '#784512'
bright_blue   = '#1f586e'
bright_purple = '#6b20c7'
bright_cyan   = '#2d5953'
bright_white  = '#4d4529'
