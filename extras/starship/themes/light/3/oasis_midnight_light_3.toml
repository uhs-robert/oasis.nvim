# Oasis Midnight Light 3 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_midnight_light_3"

[palettes.oasis_midnight_light_3]
# Accent
primary       = '#5a551e'
strong_primary = '#7f7a3b'

# ANSI colors (0-7)
black         = '#3c3c3c'
red           = '#a51111'
green         = '#345b30'
blue          = '#125393'
purple        = '#6d20c7'
cyan          = '#2d5954'
white         = '#463b0f'

# Bright ANSI colors (8-15)
bright_black  = '#433a34'
bright_red    = '#a51111'
bright_green  = '#315c2a'
bright_yellow = '#794512'
bright_blue   = '#1f586e'
bright_purple = '#6c21c8'
bright_cyan   = '#2d5a53'
bright_white  = '#423c24'
