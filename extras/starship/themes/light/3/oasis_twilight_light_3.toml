# Oasis Twilight Light 3 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_twilight_light_3"

[palettes.oasis_twilight_light_3]
# Accent
primary       = '#89280b'
strong_primary = '#8e3d1f'

# ANSI colors (0-7)
