red           = '#ab1111'
green         = '#365f32'
blue          = '#135699'
purple        = '#7121ce'
cyan          = '#2f5d58'
white         = '#4a3e10'

# Bright ANSI colors (8-15)
bright_black  = '#463d37'
bright_red    = '#ab1111'
bright_green  = '#335f2c'
bright_yellow = '#7e4813'
bright_blue   = '#215b73'
bright_purple = '#7022d0'
bright_cyan   = '#2f5d56'
bright_white  = '#463f26'
