# Oasis Luna Light 3 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_luna_light_3"

[palettes.oasis_luna_light_3]
# Accent
primary       = '#817613'
strong_primary = '#777237'

# ANSI colors (0-7)
black         = '#3b3b3b'
red           = '#900f0f'
green         = '#2d4f2a'
blue          = '#104880'
purple        = '#5f1cad'
cyan          = '#274e49'
white         = '#453a0f'

# Bright ANSI colors (8-15)
bright_black  = '#423a33'
bright_red    = '#900f0f'
bright_green  = '#2a5025'
bright_yellow = '#693c10'
bright_blue   = '#1b4c60'
bright_purple = '#5e1daf'
bright_cyan   = '#274e48'
bright_white  = '#413b23'
