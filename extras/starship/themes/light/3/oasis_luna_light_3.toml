red           = '#aa1111'
green         = '#355e31'
blue          = '#135698'
purple        = '#7121cd'
cyan          = '#2f5c57'
white         = '#493e10'

# Bright ANSI colors (8-15)
bright_black  = '#463d36'
bright_red    = '#aa1111'
bright_green  = '#325f2c'
bright_yellow = '#7d4813'
bright_blue   = '#205b72'
bright_purple = '#6f22ce'
bright_cyan   = '#2f5c56'
bright_white  = '#453e25'
