# Oasis Luna Light 3 – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_luna_light_3"

[palettes.oasis_luna_light_3]
# Accent
primary       = '#685f10'
strong_primary = '#3c2f8b'

# ANSI colors (0-7)
