# Oasis Starlight Dark – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_starlight_dark"

[palettes.oasis_starlight_dark]
# Accent
primary       = '#58B8FD'
strong_primary = '#3AACFD'

# ANSI colors (0-7)
black         = '#000000'
red           = '#FF7979'
green         = '#7FCF78'
blue          = '#81C0FF'
purple        = '#C695FF'
cyan          = '#68C0B6'
white         = '#FFF7D7'

# Bright ANSI colors (8-15)
bright_black  = '#4F5B6B'
bright_red    = '#FFA0A0'
bright_green  = '#A3E39A'
bright_yellow = '#F8B471'
bright_blue   = '#87CEEB'
bright_purple = '#D2ADFF'
bright_cyan   = '#8FD1C7'
bright_white  = '#F7F4E9'
