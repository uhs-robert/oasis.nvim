# Oasis Cactus Dark – Starship palette
# https://github.com/uhs-robert/oasis.nvim

palette = "oasis_cactus_dark"

[palettes.oasis_cactus_dark]
# Accent
primary       = '#A7D3A9'
strong_primary = '#7FBB82'

# ANSI colors (0-7)
black         = '#18231A'
red           = '#FF7979'
green         = '#7FCF78'
blue          = '#81C0FF'
purple        = '#C695FF'
cyan          = '#68C0B6'
white         = '#FFF7D7'

# Bright ANSI colors (8-15)
bright_black  = '#5B7360'
bright_red    = '#FFA0A0'
bright_green  = '#A3E39A'
bright_yellow = '#F8B471'
bright_blue   = '#87CEEB'
bright_purple = '#D2ADFF'
bright_cyan   = '#8FD1C7'
bright_white  = '#F7F4E9'
