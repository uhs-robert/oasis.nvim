# extras/yazi/themes/light/3/flavors/oasis-sol-light-3.yazi/flavor.toml
## name: Oasis Oasis Sol Light 3
## author: uhs-robert

# MANAGER
[mgr]
cwd = { fg = "#944f0a" }

find_keyword = { fg = "#7ad1a7", bold = true, italic = true, underline = true }
find_position = { fg = "#6b4b0c", bg = "reset", bold = true, italic = true }

marker_copied = { fg = "#704016", bg = "#704016" }
marker_cut = { fg = "#6b4b0c", bg = "#6b4b0c" }
marker_marked = { fg = "#0e447b", bg = "#0e447b" }
marker_selected = { fg = "#58521d", bg = "#58521d" }

count_copied = { fg = "#f7d4d4", bg = "#704016" }
count_cut = { fg = "#f7d4d4", bg = "#6b4b0c" }
count_selected = { fg = "#f7d4d4", bg = "#58521d" }

border_symbol = "Ôöé"
border_style = { fg = "#832020" }

# TABS
[tabs]
active = { fg = "#f7d4d4", bg = "#89280b", bold = true }
inactive = { fg = "#89280b", bg = "#f5c7c7" }

# MODE
[mode]
normal_main = { fg = "#f7d4d4", bg = "#89280b", bold = true }
normal_alt = { fg = "#89280b", bg = "#f0adad" }

select_main = { fg = "#f7d4d4", bg = "#784412", bold = true }
select_alt = { fg = "#784412", bg = "#f0adad" }

unset_main = { fg = "#f7d4d4", bg = "#750e0e", bold = true }
unset_alt = { fg = "#750e0e", bg = "#f0adad" }

# STATUS
[status]
sep_left = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

progress_label = { fg = "#f7d4d4", bold = true }
progress_normal = { fg = "#0e447b", bg = "#f7d4d4" }
progress_error = { fg = "#6b4b0c", bg = "#f7d4d4" }

perm_sep = { fg = "#735c5a" }
perm_type = { fg = "#0e447b" }
perm_read = { fg = "#58521d" }
perm_write = { fg = "#6b4b0c" }
perm_exec = { fg = "#704016" }

# INPUT
[input]
border = { fg = "#89280b" }
title = {}
value = {}
selected = { reversed = true }

# PICK
[pick]
border = { fg = "#89280b" }
active = { fg = "#944f0a", bold = true }
inactive = {}

# COMPLETION
[cmp]
border = { fg = "#89280b" }

# TASKS
[tasks]
border = { fg = "#89280b" }
title = {}
hovered = { fg = "#944f0a", underline = true }

# WHICH
[which]
mask = { bg = "#f5c7c7" }
cand = { fg = "#944f0a" }
rest = { fg = "#6b362d" }
desc = { fg = "#0e447b" }
separator = " ¯¬£ "
separator_style = { fg = "#735c5a" }

# HELP
[help]
on = { fg = "#89280b" }
run = { fg = "#0e447b" }
hovered = { reversed = true, bold = true }
footer = { fg = "#6b362d", bg = "#f0adad" }

# NOTIFY
[notify]
title_info = { fg = "#0e447b" }
title_warn = { fg = "#58521d" }
title_error = { fg = "#6b4b0c" }

# FILETYPE
[filetype]
rules = [
  # Media
  { mime = "image/*", fg = "#58521d" },
  { mime = "video/*", fg = "#784412" },
  { mime = "audio/*", fg = "#2d5852" },

  # Archives
  { mime = "application/*zip", fg = "#6b20c6" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#6b20c6" },

  # Documents
  { mime = "application/{pdf,doc,rtf,txt,md,vnd.oasis.opendocument.text*}", fg = "#335a2f" },
  { mime = "text/{richtext,markdown}", fg = "#335a2f" },
  { mime = "text/{csv}", fg = "#305b2a" },
  { mime = "application/{vnd.ms-excel*,vnd.oasis.opendocument.spreadsheet*,vnd.openxmlformats-officedocument.spreadsheet*}", fg = "#305b2a" },

  # Orphans / Empty
  { mime = "inode/empty", fg = "#a31010"},
  { url = "*", is = "orphan", fg = "#a31010"},

  # Executables
  { url = "*", is = "exec", fg = "#89280b"},

  # Directory
  { url = "*/", fg = "#732508" },
]

# SPOT
[spot]
border = { fg = "#750e0e" }
title = { fg = "#944f0a" }
tbl_cell = { fg = "#944f0a", reversed = true }
tbl_col = { bold = true }

