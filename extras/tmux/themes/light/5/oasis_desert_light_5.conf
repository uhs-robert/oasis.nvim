# vim:set ft=tmux:
## name: Oasis Desert Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#6a662f"
set -ogq @thm_primary "#71670f"
set -ogq @thm_light_primary "#5b520b"
set -ogq @thm_secondary "#8a0000"
set -ogq @thm_prefix "#296624"
set -ogq @thm_fg "#584836"

# Surfaces and overlays
set -ogq @thm_core "#ece6c6"
set -ogq @thm_mantle "#e8e1bb"
set -ogq @thm_surface "#e1d7a4"
set -ogq @thm_visual "#e1c99d"

# General
set -ogq @thm_red "#ad1111"
set -ogq @thm_orange "#804913"
set -ogq @thm_yellow "#5e581f"
set -ogq @thm_green "#a1171b"
set -ogq @thm_teal "#305f57"
set -ogq @thm_blue "#13579b"
set -ogq @thm_indigo "#7322d1"
