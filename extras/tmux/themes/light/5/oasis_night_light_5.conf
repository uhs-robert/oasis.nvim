# vim:set ft=tmux:
## name: Oasis Night Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#2d4c6c"
set -ogq @thm_primary "#263f5a"
set -ogq @thm_light_primary "#1e3448"
set -ogq @thm_secondary "#7a6f10"
set -ogq @thm_prefix "#8a0000"
set -ogq @thm_fg "#473726"

# Surfaces and overlays
set -ogq @thm_core "#aad0ee"
set -ogq @thm_mantle "#9ec9eb"
set -ogq @thm_surface "#84bbe6"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#8f0e0e"
set -ogq @thm_orange "#683b0f"
set -ogq @thm_yellow "#4c4719"
set -ogq @thm_green "#831216"
set -ogq @thm_teal "#274d47"
set -ogq @thm_blue "#0f477f"
set -ogq @thm_indigo "#5e1cab"
