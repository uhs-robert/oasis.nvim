# vim:set ft=tmux:
## name: Oasis Cactus Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#3a6c3c"
set -ogq @thm_primary "#234124"
set -ogq @thm_light_primary "#1e3b1f"
set -ogq @thm_secondary "#630000"
set -ogq @thm_prefix "#3e008a"
set -ogq @thm_fg "#121714"

# Surfaces and overlays
set -ogq @thm_core "#cbebd7"
set -ogq @thm_mantle "#c0e7cf"
set -ogq @thm_surface "#aadebe"
set -ogq @thm_visual "#a4dac0"

# General
set -ogq @thm_red "#ab1111"
set -ogq @thm_orange "#7e4812"
set -ogq @thm_yellow "#5d571f"
set -ogq @thm_green "#941015"
set -ogq @thm_teal "#2f5d56"
set -ogq @thm_blue "#135699"
set -ogq @thm_indigo "#7122ce"
