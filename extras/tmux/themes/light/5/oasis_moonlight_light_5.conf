# vim:set ft=tmux:
## name: Oasis Moonlight Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#315275"
set -ogq @thm_primary "#1e3146"
set -ogq @thm_light_primary "#1a2d3f"
set -ogq @thm_secondary "#58500b"
set -ogq @thm_prefix "#8a0000"
set -ogq @thm_fg "#161412"

# Surfaces and overlays
set -ogq @thm_core "#e9ddbe"
set -ogq @thm_mantle "#e6d7b3"
set -ogq @thm_surface "#decb9c"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a51010"
set -ogq @thm_orange "#794512"
set -ogq @thm_yellow "#59531d"
set -ogq @thm_green "#8e0f14"
set -ogq @thm_teal "#2d5952"
set -ogq @thm_blue "#125393"
set -ogq @thm_indigo "#6d20c6"
