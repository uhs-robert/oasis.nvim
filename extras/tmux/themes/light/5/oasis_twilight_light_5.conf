# vim:set ft=tmux:
## name: Oasis Twilight Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#8a391c"
set -ogq @thm_primary "#5e1a06"
set -ogq @thm_light_primary "#551a04"
set -ogq @thm_secondary "#2d0063"
set -ogq @thm_prefix "#7a6f10"
set -ogq @thm_fg "#161217"

# Surfaces and overlays
set -ogq @thm_core "#f3c5ba"
set -ogq @thm_mantle "#f1baad"
set -ogq @thm_surface "#eca493"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#940e0e"
set -ogq @thm_orange "#6c3e10"
set -ogq @thm_yellow "#4f4a1a"
set -ogq @thm_green "#7c0d12"
set -ogq @thm_teal "#28504a"
set -ogq @thm_blue "#104a83"
set -ogq @thm_indigo "#621db2"
