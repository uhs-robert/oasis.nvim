# vim:set ft=tmux:
## name: Oasis Midnight Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#7f7a3b"
set -ogq @thm_primary "#5a551e"
set -ogq @thm_light_primary "#60570e"
set -ogq @thm_secondary "#750202"
set -ogq @thm_prefix "#31732b"
