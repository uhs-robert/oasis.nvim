# vim:set ft=tmux:
## name: Oasis Midnight Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#777237"
set -ogq @thm_primary "#6f6825"
set -ogq @thm_light_primary "#6b6110"
set -ogq @thm_secondary "#9b0303"
set -ogq @thm_prefix "#31732b"
