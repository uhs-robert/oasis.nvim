set -ogq @thm_surface "#efb5a9"
set -ogq @thm_visual "#e1c99d"

# General
set -ogq @thm_red "#a41111"
set -ogq @thm_orange "#784512"
set -ogq @thm_yellow "#59521d"
set -ogq @thm_green "#8d0f14"
set -ogq @thm_teal "#2d5953"
set -ogq @thm_blue "#125292"
set -ogq @thm_indigo "#6d20c6"
