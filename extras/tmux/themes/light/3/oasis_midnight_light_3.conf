# General
set -ogq @thm_red "#ab1111"
set -ogq @thm_orange "#7e4813"
set -ogq @thm_yellow "#5c561f"
set -ogq @thm_green "#9e171b"
set -ogq @thm_teal "#2f5c56"
set -ogq @thm_blue "#135698"
set -ogq @thm_indigo "#7121ce"
