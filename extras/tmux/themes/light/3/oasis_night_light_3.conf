# vim:set ft=tmux:
## name: Oasis Night Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#355679"
set -ogq @thm_primary "#2d4967"
set -ogq @thm_light_primary "#253e55"
set -ogq @thm_secondary "#897e15"
set -ogq @thm_prefix "#9b0303"
