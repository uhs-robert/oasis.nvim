# vim:set ft=tmux:
## name: Oasis Moonlight Light 3
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#395c82"
set -ogq @thm_primary "#253b53"
set -ogq @thm_light_primary "#21384c"
set -ogq @thm_secondary "#685f10"
set -ogq @thm_prefix "#9b0303"
set -ogq @thm_fg "#161412"

# Surfaces and overlays
set -ogq @thm_core "#f1ebd5"
set -ogq @thm_mantle "#eee6c9"
set -ogq @thm_surface "#e6dbb2"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#b41212"
set -ogq @thm_orange "#854c14"
set -ogq @thm_yellow "#625b20"
set -ogq @thm_green "#9c1116"
set -ogq @thm_teal "#32625b"
set -ogq @thm_blue "#145ba1"
set -ogq @thm_indigo "#7723d9"
