# General
set -ogq @thm_red "#a11010"
set -ogq @thm_orange "#764312"
set -ogq @thm_yellow "#57511d"
set -ogq @thm_green "#941519"
set -ogq @thm_teal "#2c5751"
set -ogq @thm_blue "#11518f"
set -ogq @thm_indigo "#6a1fc1"
