# General
set -ogq @thm_red "#ab1111"
set -ogq @thm_orange "#7e4813"
set -ogq @thm_yellow "#5d561f"
set -ogq @thm_green "#764317"
set -ogq @thm_teal "#2f5d56"
set -ogq @thm_blue "#135699"
set -ogq @thm_indigo "#7121ce"
