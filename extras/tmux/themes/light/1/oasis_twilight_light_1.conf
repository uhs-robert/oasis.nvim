# General
set -ogq @thm_red "#c11313"
set -ogq @thm_orange "#8f5215"
set -ogq @thm_yellow "#696223"
set -ogq @thm_green "#aa1318"
set -ogq @thm_teal "#356a62"
set -ogq @thm_blue "#1662af"
set -ogq @thm_indigo "#8030de"
