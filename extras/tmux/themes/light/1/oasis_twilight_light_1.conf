# vim:set ft=tmux:
## name: Oasis Twilight Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#a64a28"
set -ogq @thm_primary "#7f270d"
set -ogq @thm_light_primary "#77280b"
set -ogq @thm_secondary "#400687"
set -ogq @thm_prefix "#988c1a"
set -ogq @thm_fg "#201920"

# Surfaces and overlays
set -ogq @thm_core "#f9f6f5"
set -ogq @thm_mantle "#f3edeb"
set -ogq @thm_surface "#e8dcd8"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#c11313"
set -ogq @thm_orange "#8e5215"
set -ogq @thm_yellow "#696223"
set -ogq @thm_green "#a91218"
set -ogq @thm_teal "#356961"
set -ogq @thm_blue "#1561ae"
set -ogq @thm_indigo "#7f2fde"
