# General
set -ogq @thm_red "#c01313"
set -ogq @thm_orange "#8e5115"
set -ogq @thm_yellow "#686223"
set -ogq @thm_green "#a81218"
set -ogq @thm_teal "#356961"
set -ogq @thm_blue "#1561ae"
set -ogq @thm_indigo "#7f2edd"
