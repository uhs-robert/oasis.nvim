# vim:set ft=tmux:
## name: Oasis Moonlight Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#40668e"
set -ogq @thm_primary "#2c4560"
set -ogq @thm_light_primary "#28425a"
set -ogq @thm_secondary "#786e14"
set -ogq @thm_prefix "#ab0707"
