# vim:set ft=tmux:
## name: Oasis Starlight Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#1e75b1"
set -ogq @thm_primary "#075085"
set -ogq @thm_light_primary "#16536c"
set -ogq @thm_secondary "#786e14"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#1e1b15"

# Surfaces and overlays
set -ogq @thm_core "#f9f7f5"
set -ogq @thm_mantle "#f3efeb"
set -ogq @thm_surface "#e8e0d8"
set -ogq @thm_visual "#dacfa4"

# General
set -ogq @thm_red "#c21313"
set -ogq @thm_orange "#8f5215"
set -ogq @thm_yellow "#696323"
set -ogq @thm_green "#aa1318"
set -ogq @thm_teal "#356a62"
set -ogq @thm_blue "#1662af"
set -ogq @thm_indigo "#8030de"
