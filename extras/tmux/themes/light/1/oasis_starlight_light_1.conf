# vim:set ft=tmux:
## name: Oasis Starlight Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#1e75b1"
set -ogq @thm_primary "#075085"
set -ogq @thm_light_primary "#16536c"
set -ogq @thm_secondary "#786e14"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#24211a"

# Surfaces and overlays
set -ogq @thm_core "#ffffff"
set -ogq @thm_mantle "#f0f0f0"
set -ogq @thm_surface "#e8e8e8"
set -ogq @thm_visual "#dacfa4"

# General
set -ogq @thm_red "#ca1414"
set -ogq @thm_orange "#955616"
set -ogq @thm_yellow "#6e6725"
set -ogq @thm_green "#b21319"
set -ogq @thm_teal "#386f66"
set -ogq @thm_blue "#1766b7"
set -ogq @thm_indigo "#8538df"
