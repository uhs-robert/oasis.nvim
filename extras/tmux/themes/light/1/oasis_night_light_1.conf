# vim:set ft=tmux:
## name: Oasis Night Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#3c6085"
set -ogq @thm_primary "#355374"
set -ogq @thm_light_primary "#2c4962"
set -ogq @thm_secondary "#988c1a"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#5f4c34"

# Surfaces and overlays
set -ogq @thm_core "#eaedf1"
set -ogq @thm_mantle "#e0e6eb"
set -ogq @thm_surface "#ced6de"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#b61212"
set -ogq @thm_orange "#864d14"
set -ogq @thm_yellow "#625c21"
set -ogq @thm_green "#a9181c"
set -ogq @thm_teal "#32635c"
set -ogq @thm_blue "#145ca4"
set -ogq @thm_indigo "#7824dc"
