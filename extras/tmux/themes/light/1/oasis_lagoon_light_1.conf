# General
set -ogq @thm_red "#c41414"
set -ogq @thm_orange "#915316"
set -ogq @thm_yellow "#6b6424"
set -ogq @thm_green "#ac1319"
set -ogq @thm_teal "#366c63"
set -ogq @thm_blue "#1663b1"
set -ogq @thm_indigo "#8133de"
