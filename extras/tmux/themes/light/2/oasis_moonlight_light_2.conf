# vim:set ft=tmux:
## name: Oasis Moonlight Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#3c6188"
set -ogq @thm_primary "#28405a"
set -ogq @thm_light_primary "#253d53"
set -ogq @thm_secondary "#706712"
set -ogq @thm_prefix "#a30505"
set -ogq @thm_fg "#191615"

# Surfaces and overlays
set -ogq @thm_core "#f6f2e4"
set -ogq @thm_mantle "#f3edd8"
set -ogq @thm_surface "#ebe2c1"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#bc1313"
set -ogq @thm_orange "#8a4f14"
set -ogq @thm_yellow "#665f22"
set -ogq @thm_green "#a41218"
set -ogq @thm_teal "#34665f"
set -ogq @thm_blue "#155fa9"
set -ogq @thm_indigo "#7c2bdc"
