# General
set -ogq @thm_red "#b31212"
set -ogq @thm_orange "#844c13"
set -ogq @thm_yellow "#615b21"
set -ogq @thm_green "#9c1117"
set -ogq @thm_teal "#32625a"
set -ogq @thm_blue "#145aa2"
set -ogq @thm_indigo "#7624d8"
