# vim:set ft=tmux:
## name: Oasis Twilight Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#954122"
set -ogq @thm_primary "#912c0d"
set -ogq @thm_light_primary "#7b280a"
set -ogq @thm_secondary "#4c05a3"
set -ogq @thm_prefix "#918517"
set -ogq @thm_fg "#534355"

# Surfaces and overlays
set -ogq @thm_core "#f2ddd4"
set -ogq @thm_mantle "#efd3c8"
set -ogq @thm_surface "#e8c0b0"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a91111"
set -ogq @thm_orange "#7c4712"
set -ogq @thm_yellow "#5b551f"
set -ogq @thm_green "#9c161b"
set -ogq @thm_teal "#2f5c55"
set -ogq @thm_blue "#135598"
set -ogq @thm_indigo "#7021cb"
