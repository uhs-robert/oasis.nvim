# vim:set ft=tmux:
## name: Oasis Rose Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#8a462e"
set -ogq @thm_primary "#912c0d"
set -ogq @thm_light_primary "#7b280a"
set -ogq @thm_secondary "#3b6d3d"
set -ogq @thm_prefix "#33756b"
set -ogq @thm_fg "#6b3f4c"

# Surfaces and overlays
set -ogq @thm_core "#d9edd9"
set -ogq @thm_mantle "#cee8ce"
set -ogq @thm_surface "#badeba"
set -ogq @thm_visual "#dba3c6"

# General
set -ogq @thm_red "#b01212"
set -ogq @thm_orange "#814a13"
set -ogq @thm_yellow "#5f5920"
set -ogq @thm_green "#7a4618"
set -ogq @thm_teal "#316059"
set -ogq @thm_blue "#14599f"
set -ogq @thm_indigo "#7523d4"
