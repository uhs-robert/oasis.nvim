# vim:set ft=tmux:
## name: Oasis Rose Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#8a3a55"
set -ogq @thm_primary "#5e2438"
set -ogq @thm_light_primary "#5b1d31"
set -ogq @thm_secondary "#2e542f"
set -ogq @thm_prefix "#33756b"
