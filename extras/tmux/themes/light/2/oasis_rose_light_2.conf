set -ogq @thm_surface "#eec9e0"
set -ogq @thm_visual "#dba3c6"

# General
set -ogq @thm_red "#b91313"
set -ogq @thm_orange "#894e14"
set -ogq @thm_yellow "#645e22"
set -ogq @thm_green "#5a5116"
set -ogq @thm_teal "#33655d"
set -ogq @thm_blue "#145da7"
set -ogq @thm_indigo "#7a28db"
