# vim:set ft=tmux:
## name: Oasis Night Light 2
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#395b7f"
set -ogq @thm_primary "#314e6d"
set -ogq @thm_light_primary "#29435c"
set -ogq @thm_secondary "#918517"
set -ogq @thm_prefix "#a30505"
set -ogq @thm_fg "#57452f"

# Surfaces and overlays
set -ogq @thm_core "#d4e3f2"
set -ogq @thm_mantle "#c8dbef"
set -ogq @thm_surface "#b1cce7"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a91111"
set -ogq @thm_orange "#7c4712"
set -ogq @thm_yellow "#5b551f"
set -ogq @thm_green "#9c161b"
set -ogq @thm_teal "#2f5c55"
set -ogq @thm_blue "#135598"
set -ogq @thm_indigo "#7021cb"
