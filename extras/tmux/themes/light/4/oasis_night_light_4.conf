# vim:set ft=tmux:
## name: Oasis Night Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#35577b"
set -ogq @thm_primary "#21364d"
set -ogq @thm_light_primary "#1e3346"
set -ogq @thm_secondary "#60580d"
set -ogq @thm_prefix "#920101"
set -ogq @thm_fg "#0c131c"

# Surfaces and overlays
set -ogq @thm_core "#c4dcf2"
set -ogq @thm_mantle "#b8d4ef"
set -ogq @thm_surface "#9fc5ea"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#9f1010"
set -ogq @thm_orange "#754311"
set -ogq @thm_yellow "#56501d"
set -ogq @thm_green "#880f13"
set -ogq @thm_teal "#2c5650"
set -ogq @thm_blue "#11508e"
set -ogq @thm_indigo "#6920c0"
