# vim:set ft=tmux:
## name: Oasis Rose Light 4
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#7c3e27"
set -ogq @thm_primary "#812509"
set -ogq @thm_light_primary "#6a2106"
set -ogq @thm_secondary "#336135"
set -ogq @thm_prefix "#2c685f"
